services:
  gateway:
    build: .
    ports:
      - "3002:3002"
    env_file:
      - .env
    volumes:
      # Mount credentials.json for Google Sheets (optional - sheets connector gracefully fails without it)
      - ./credentials.json:/app/credentials.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
